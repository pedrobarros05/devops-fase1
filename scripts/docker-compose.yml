version: '3.8'

services:
  app:
    image: ${DOCKER_USER:-pedrobarros05}/devops-app:${TAG:-latest}
    container_name: devops-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
